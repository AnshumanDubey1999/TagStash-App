name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bump Version and Verify Tag
        id: bump_version
        run: |
          # Read current version from gradle.properties
          VERSION_CODE=$(grep 'app.version.code=' gradle.properties | cut -d= -f2)
          VERSION_NAME=$(grep 'app.version.name=' gradle.properties | cut -d= -f2)
          
          # Calculate new version code
          NEW_CODE=$((VERSION_CODE + 1))
          
          # Parse version name components
          IFS='.' read -r major minor patch <<< "$VERSION_NAME"
          
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          
          if [ "$RELEASE_TYPE" = "major" ]; then
            NEW_NAME="$((major + 1)).0.0"
          elif [ "$RELEASE_TYPE" = "minor" ]; then
            NEW_NAME="${major}.$((minor + 1)).0"
          else
            NEW_NAME="${major}.${minor}.$((patch + 1))"
          fi
          
          TAG_NAME="v$NEW_NAME"
          
          # Check if tag already exists in the repository
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1 || [ -n "$(git tag -l "$TAG_NAME")" ]; then
            echo "Error: Tag $TAG_NAME already exists!"
            exit 1
          fi
          
          echo "Bumping version from $VERSION_NAME ($VERSION_CODE) to $NEW_NAME ($NEW_CODE)..."
          
          # Update gradle.properties
          sed -i "s/app.version.code=.*/app.version.code=$NEW_CODE/" gradle.properties
          sed -i "s/app.version.name=.*/app.version.name=$NEW_NAME/" gradle.properties
          
          # Export to environment variables
          echo "NEW_VERSION_NAME=$NEW_NAME" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Commit and Push Version Bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "[release] Bump version to v${{ env.NEW_VERSION_NAME }}"
          git tag "${{ env.TAG_NAME }}"
          git push origin main
          git push origin "${{ env.TAG_NAME }}"

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename Release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tagstash-${{ env.NEW_VERSION_NAME }}.apk

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG_NAME }}" app/build/outputs/apk/release/tagstash-${{ env.NEW_VERSION_NAME }}.apk \
            --title "Release v${{ env.NEW_VERSION_NAME }}" \
            --generate-notes
